version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: indel
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: indel
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U indel -d indel"]
      interval: 5s
      timeout: 5s
      retries: 20

  db-migrate:
    image: migrate/migrate:v4.17.1
    command:
      [
        "-path",
        "/migrations",
        "-database",
        "postgres://indel:password@postgres:5432/indel?sslmode=disable",
        "up"
      ]
    volumes:
      - ./migrations:/migrations
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    ports:
      - "9092:9092"

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"

  core:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        SERVICE: core
    environment:
      INDEL_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: indel
      DB_PASSWORD: ${DB_PASSWORD:-password}
      DB_NAME: indel
      KAFKA_BROKERS: kafka:9092
    ports:
      - "${HOST_IP}:8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
      kafka:
        condition: service_started

  worker-gateway:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        SERVICE: worker-gateway
    environment:
      INDEL_ENV: production
      SERVICE: worker-gateway
      CORE_URL: http://core:8000
      PREMIUM_ML_URL: http://premium-ml:8000/ml/v1/premium/calculate
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: indel
      DB_PASSWORD: ${DB_PASSWORD:-password}
      DB_NAME: indel
    ports:
      - "${HOST_IP}:8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
      core:
        condition: service_started
      premium-ml:
        condition: service_started

  insurer-gateway:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        SERVICE: insurer-gateway
    environment:
      INDEL_ENV: production
      SERVICE: insurer-gateway
      CORE_URL: http://core:8000
    ports:
      - "${HOST_IP}:8002:8002"
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      core:
        condition: service_started

  platform-gateway:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        SERVICE: platform-gateway
    environment:
      INDEL_ENV: production
      SERVICE: platform-gateway
      CORE_URL: http://core:8000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: indel
      DB_PASSWORD: ${DB_PASSWORD:-password}
      DB_NAME: indel
    ports:
      - "${HOST_IP}:8003:8003"
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      core:
        condition: service_started

  api-gateway:
    image: nginx:1.27-alpine
    ports:
      - "8004:80"
    volumes:
      - ./infra/nginx/api-gateway.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      worker-gateway:
        condition: service_started
      platform-gateway:
        condition: service_started

  platform-dashboard:
    build:
      context: ./platform-dashboard
      dockerfile: Dockerfile
      args:
        VITE_PLATFORM_API_URL: ${PLATFORM_API_URL:-http://localhost:8004}
    ports:
      - "5174:5174"
    depends_on:
      api-gateway:
        condition: service_started

  premium-ml:
    build:
      context: ./ml
      dockerfile: premium/Dockerfile
    ports:
      - "9001:8000"
    environment:
      SERVICE_PORT: 8000

  fraud-ml:
    build:
      context: ./ml
      dockerfile: fraud/Dockerfile
    ports:
      - "9002:8000"
    environment:
      SERVICE_PORT: 8000

  forecast-ml:
    build:
      context: ./ml
      dockerfile: forecast/Dockerfile
    ports:
      - "9003:8000"
    environment:
      SERVICE_PORT: 8000

volumes:
  postgres_data:
