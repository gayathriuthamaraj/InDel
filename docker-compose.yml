version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: indel
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: indel
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U indel -d indel"]
      interval: 5s
      timeout: 5s
      retries: 20

  db-migrate:
    image: migrate/migrate:v4.17.1
    command:
      [
        "-path",
        "/migrations",
        "-database",
        "postgres://indel:${POSTGRES_PASSWORD:-password}@postgres:5432/indel?sslmode=disable",
        "up"
      ]
    volumes:
      - ./migrations:/migrations
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list > /dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 20s

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"

  core:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        SERVICE: core
    environment:
      INDEL_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: indel
      DB_PASSWORD: ${DB_PASSWORD:-password}
      DB_NAME: indel
      KAFKA_BROKERS: kafka:9092
      RAZORPAY_API_KEY: ${RAZORPAY_API_KEY:-}
      RAZORPAY_API_SECRET: ${RAZORPAY_API_SECRET:-}
      RAZORPAY_MODE: ${RAZORPAY_MODE:-test}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:8000/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 20s

  worker-gateway:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        SERVICE: worker-gateway
    environment:
      INDEL_ENV: production
      SERVICE: worker-gateway
      CORE_URL: http://core:8000
      PREMIUM_ML_URL: http://premium-ml:8000/ml/v1/premium/calculate
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: indel
      DB_PASSWORD: ${DB_PASSWORD:-password}
      DB_NAME: indel
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
      core:
        condition: service_healthy
      premium-ml:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:8001/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 20s

  insurer-gateway:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        SERVICE: insurer-gateway
    environment:
      INDEL_ENV: production
      SERVICE: insurer-gateway
      CORE_URL: http://core:8000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: indel
      DB_PASSWORD: ${DB_PASSWORD:-password}
      DB_NAME: indel
      KAFKA_BROKERS: kafka:9092
    ports:
      - "8002:8002"
    depends_on:
      postgres:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
      core:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:8002/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 20s

  platform-gateway:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        SERVICE: platform-gateway
    environment:
      INDEL_ENV: production
      SERVICE: platform-gateway
      CORE_URL: http://core:8000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: indel
      DB_PASSWORD: ${DB_PASSWORD:-password}
      DB_NAME: indel
    ports:
      - "8003:8003"
    depends_on:
      postgres:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
      core:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:8003/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 20s

  api-gateway:
    image: nginx:1.27-alpine
    ports:
      - "8004:80"
    volumes:
      - ./infra/nginx/api-gateway.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      worker-gateway:
        condition: service_healthy
      platform-gateway:
        condition: service_healthy
      insurer-gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 10s

  platform-dashboard:
    build:
      context: ./platform-dashboard
      dockerfile: Dockerfile
      args:
        VITE_PLATFORM_API_URL: ${PLATFORM_API_URL:-http://localhost:8004}
    ports:
      - "5174:5174"
    depends_on:
      api-gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:5174 >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 20s

  premium-ml:
    build:
      context: ./ml
      dockerfile: premium/Dockerfile
    ports:
      - "9001:8000"
    environment:
      SERVICE_PORT: 8000
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)\""]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 20s

  fraud-ml:
    build:
      context: ./ml
      dockerfile: fraud/Dockerfile
    ports:
      - "9002:8000"
    environment:
      SERVICE_PORT: 8000
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)\""]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 20s

  forecast-ml:
    build:
      context: ./ml
      dockerfile: forecast/Dockerfile
    ports:
      - "9003:8000"
    environment:
      SERVICE_PORT: 8000
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)\""]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 20s

  backend-worker-tests:
    image: golang:1.22
    working_dir: /app/backend
    command: ["sh", "-c", "go test ./internal/handlers/worker -v"]
    volumes:
      - ./:/app
    depends_on:
      db-migrate:
        condition: service_completed_successfully
    restart: "no"
    profiles:
      - test

volumes:
  postgres_data:
