version: '3.8'
services:
  core:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        SERVICE: core
    environment:
      INDEL_ENV: demo
      SERVICE: core
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: indel
      DB_PASSWORD: ${DB_PASSWORD:-demo_password}
      DB_NAME: indel_demo
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET}
      FRAUD_LAYER_ENABLED: 'true'
      FRAUD_SERVICE_URL: http://ml-service:8000
      PREMIUM_ML_URL: http://ml-service:8000
    ports:
    - 8000:8000
    depends_on:
      postgres:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      ml-service:
        condition: service_healthy
    healthcheck:
      test:
      - CMD-SHELL
      - wget -q -O - http://127.0.0.1:8000/health >/dev/null 2>&1 || exit 1
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: indel
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-demo_password}
      POSTGRES_DB: indel_demo
    ports:
    - 5432:5432
    volumes:
    - postgres_demo_data:/var/lib/postgresql/data
    healthcheck:
      test:
      - CMD-SHELL
      - pg_isready -U indel -d indel_demo
      interval: 5s
      timeout: 5s
      retries: 20
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
  redis:
    image: redis:7-alpine
    ports:
    - 6379:6379
    healthcheck:
      test:
      - CMD
      - redis-cli
      - ping
      interval: 5s
      timeout: 5s
      retries: 5
  db-migrate:
    image: migrate/migrate:v4.17.1
    command:
    - -path
    - /migrations
    - -database
    - postgres://indel:${POSTGRES_PASSWORD:-demo_password}@postgres:5432/indel_demo?sslmode=disable
    - up
    volumes:
    - ./migrations:/migrations
    depends_on:
      postgres:
        condition: service_healthy
    restart: 'no'
  kafka:
    image: confluentinc/cp-kafka:7.4.0
    depends_on:
      postgres:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    ports:
    - 9092:9092
    healthcheck:
      test:
      - CMD-SHELL
      - kafka-topics --bootstrap-server 127.0.0.1:9092 --list > /dev/null 2>&1
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 20s
    volumes:
    - ./zone_a.json:/root/zone_a.json:ro
    - ./zone_b.json:/root/zone_b.json:ro
    - ./zone_c.json:/root/zone_c.json:ro
    - ./zone_level.json:/root/zone_level.json:ro
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
  worker-gateway:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        SERVICE: worker-gateway
    environment:
      INDEL_ENV: demo
      SERVICE: worker-gateway
      CORE_URL: http://core:8000
      PREMIUM_ML_URL: http://ml-service:8000
      INDEL_DEMO_RESET_KEY: ${INDEL_DEMO_RESET_KEY:-change-me-demo-reset-key}
      INDEL_DEMO_ALLOWED_ROLES: ${INDEL_DEMO_ALLOWED_ROLES:-worker,admin,platform_admin,ops_manager}
      INDEL_DEMO_DESTRUCTIVE_ROLES: ${INDEL_DEMO_DESTRUCTIVE_ROLES:-admin,platform_admin}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: indel
      DB_PASSWORD: ${DB_PASSWORD:-demo_password}
      DB_NAME: indel_demo
      REDIS_URL: redis:6379
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET}
    ports:
    - ${HOST_IP:-127.0.0.1}:8001:8001
    volumes:
    - ./zone_a.json:/root/zone_a.json:ro
    - ./zone_b.json:/root/zone_b.json:ro
    - ./zone_c.json:/root/zone_c.json:ro
    depends_on:
      postgres:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
      core:
        condition: service_healthy
      redis:
        condition: service_healthy
      ml-service:
        condition: service_healthy
    healthcheck:
      test:
      - CMD-SHELL
      - wget -q -O - http://127.0.0.1:8001/health >/dev/null 2>&1 || exit 1
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 20s
  insurer-gateway:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        SERVICE: insurer-gateway
    environment:
      INDEL_ENV: demo
      SERVICE: insurer-gateway
      CORE_URL: http://core:8000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: indel
      DB_PASSWORD: ${DB_PASSWORD:-demo_password}
      DB_NAME: indel_demo
      REDIS_URL: redis:6379
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET}
    ports:
    - ${HOST_IP:-127.0.0.1}:8002:8002
    volumes:
    - ./zone_a.json:/root/zone_a.json:ro
    - ./zone_b.json:/root/zone_b.json:ro
    - ./zone_c.json:/root/zone_c.json:ro
    depends_on:
      postgres:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
      core:
        condition: service_healthy
    healthcheck:
      test:
      - CMD-SHELL
      - wget -q -O - http://127.0.0.1:8002/health >/dev/null 2>&1 || exit 1
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 20s
  platform-gateway:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        SERVICE: platform-gateway
    environment:
      INDEL_ENV: demo
      SERVICE: platform-gateway
      CORE_URL: http://core:8000
      INDEL_PLATFORM_OPERATOR_ALLOWED_ROLES: ${INDEL_PLATFORM_OPERATOR_ALLOWED_ROLES:-admin,platform_admin,ops_manager}
      INDEL_PLATFORM_WEBHOOK_ALLOWED_ROLES: ${INDEL_PLATFORM_WEBHOOK_ALLOWED_ROLES:-admin,platform_admin,ops_manager}
      INDEL_PLATFORM_WEBHOOK_KEY: ${INDEL_PLATFORM_WEBHOOK_KEY:-change-me-platform-webhook-key}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: indel
      DB_PASSWORD: ${DB_PASSWORD:-demo_password}
      DB_NAME: indel_demo
      REDIS_URL: redis:6379
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET}
    ports:
    - ${HOST_IP:-127.0.0.1}:8003:8003
    volumes:
    - ./zone_a.json:/root/zone_a.json:ro
    - ./zone_b.json:/root/zone_b.json:ro
    - ./zone_c.json:/root/zone_c.json:ro
    depends_on:
      postgres:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
      core:
        condition: service_healthy
    healthcheck:
      test:
      - CMD-SHELL
      - wget -q -O - http://127.0.0.1:8003/health >/dev/null 2>&1 || exit 1
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 20s
  api-gateway:
    image: nginx:1.27-alpine
    ports:
    - 8004:80
    volumes:
    - ./infra/nginx/api-gateway.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      worker-gateway:
        condition: service_started
      platform-gateway:
        condition: service_started
      insurer-gateway:
        condition: service_started
    healthcheck:
      test:
      - CMD-SHELL
      - wget -q -O - http://127.0.0.1/health >/dev/null 2>&1 || exit 1
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 10s
  platform-dashboard:
    build:
      context: ./platform-dashboard
      dockerfile: Dockerfile
      args:
        VITE_PLATFORM_API_URL: ${PLATFORM_API_URL:-http://localhost:8004}
    ports:
    - 5175:5175
    volumes:
    - ./platform-dashboard:/app
    - /app/node_modules
    depends_on:
      api-gateway:
        condition: service_started
    healthcheck:
      test:
      - CMD-SHELL
      - wget -q -O - http://127.0.0.1:5175 >/dev/null 2>&1 || exit 1
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 20s
  backend-worker-tests:
    image: golang:1.25
    working_dir: /app/backend
    command:
    - sh
    - -c
    - go test ./internal/handlers/worker -v
    volumes:
    - ./:/app
    depends_on:
      db-migrate:
        condition: service_completed_successfully
    restart: 'no'
    profiles:
    - test
  ml-service:
    build:
      context: ./ml
      dockerfile: Dockerfile
    ports:
    - 9000:8000
    environment:
      SERVICE_PORT: 8000
    healthcheck:
      test:
      - CMD-SHELL
      - python -c "import urllib.request; urllib.request.urlopen('http://localhost:8000/health',
        timeout=3)"
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
volumes:
  postgres_demo_data: null
