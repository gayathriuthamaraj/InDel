server {
    listen 80;
    server_name _;

    # Use Docker's internal DNS so Nginx re-resolves hostnames after container restarts
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Add CORS headers to ALL responses including errors (502, 504, etc.)
    # Without this the browser reports a "CORS error" instead of the real 502.
    add_header 'Access-Control-Allow-Origin' '*' always;
    add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
    add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept' always;

    # Strip backend CORS headers so we don't get duplicates (Firefox blocks duplicates)
    proxy_hide_header 'Access-Control-Allow-Origin';
    proxy_hide_header 'Access-Control-Allow-Methods';
    proxy_hide_header 'Access-Control-Allow-Headers';
    proxy_hide_header 'Access-Control-Allow-Private-Network';

    # Handle preflight OPTIONS requests globally
    if ($request_method = OPTIONS) {
        return 204;
    }

    location /api/v1/platform/ {
        set $upstream http://platform-gateway:8003;
        proxy_pass $upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/v1/insurer/ {
        set $upstream http://insurer-gateway:8002;
        proxy_pass $upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/v1/internal/ {
        set $upstream http://core:8000;
        proxy_pass $upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/v1/worker/ {
        set $upstream http://worker-gateway:8001;
        proxy_pass $upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/v1/auth/ {
        set $upstream http://worker-gateway:8001;
        proxy_pass $upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/v1/demo/ {
        set $upstream http://worker-gateway:8001;
        proxy_pass $upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /health {
        return 200 'ok';
        add_header Content-Type text/plain;
    }
}
