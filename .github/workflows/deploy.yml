name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v3

      - name: Deploy secrets check
        run: |
          echo "Render deploy steps run only when required secrets are configured."

      - name: Deploy backend on Render
        if: ${{ secrets.RENDER_API_TOKEN != '' && secrets.RENDER_SERVICE_ID != '' }}
        run: |
          curl -sSf -X POST "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/deploys" \
            -H "Accept: application/json" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{}'

      - name: Deploy insurer dashboard
        if: ${{ secrets.RENDER_API_TOKEN != '' && secrets.RENDER_INSURER_DASHBOARD_ID != '' }}
        run: |
          curl -sSf -X POST "https://api.render.com/v1/services/${{ secrets.RENDER_INSURER_DASHBOARD_ID }}/deploys" \
            -H "Accept: application/json" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{}'

      - name: Deploy platform dashboard
        if: ${{ secrets.RENDER_API_TOKEN != '' && secrets.RENDER_PLATFORM_DASHBOARD_ID != '' }}
        run: |
          curl -sSf -X POST "https://api.render.com/v1/services/${{ secrets.RENDER_PLATFORM_DASHBOARD_ID }}/deploys" \
            -H "Accept: application/json" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{}'

      - name: Notify deployment
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: 'InDel deployment ${{ job.status }}'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        if: ${{ always() && secrets.SLACK_WEBHOOK_URL != '' }}
