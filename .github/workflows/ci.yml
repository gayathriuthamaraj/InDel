name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  compose-validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate docker compose files
        run: |
          docker compose -f docker-compose.yml config >/dev/null
          docker compose -f docker-compose.demo.yml config >/dev/null

  backend-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_HOST_AUTH_METHOD: trust
          POSTGRES_DB: indel_test
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'

      - name: Run backend tests
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: postgres
          DB_PASSWORD: ""
          DB_NAME: indel_test
        run: |
          cd backend
          go test -v ./...

      - name: Run linter
        uses: golangci-lint-action@v6
        with:
          working-directory: backend
          version: v1.64.8
          install-mode: goinstall

  ml-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ml/requirements.txt
          pip install pytest pytest-cov

      - name: Run ML tests
        run: |
          cd ml
          pytest .

  frontend-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies (insurer)
        run: |
          cd insurer-dashboard
          npm install

      - name: Build insurer dashboard
        run: |
          cd insurer-dashboard
          npm run build

      - name: Install dependencies (platform)
        run: |
          cd platform-dashboard
          npm install

      - name: Build platform dashboard
        run: |
          cd platform-dashboard
          npm run build

  endpoint-contracts:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Check endpoint contracts
        run: node scripts/check-endpoint-contracts.mjs

  docker-build:
    runs-on: ubuntu-latest
    needs: [compose-validate, backend-tests, ml-tests, frontend-tests, endpoint-contracts]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          tags: indel-backend:latest

      - name: Build premium ML image
        uses: docker/build-push-action@v6
        with:
          context: ./ml
          file: ./ml/premium/Dockerfile
          push: false
          tags: indel-premium-ml:latest

      - name: Build fraud ML image
        uses: docker/build-push-action@v6
        with:
          context: ./ml
          file: ./ml/fraud/Dockerfile
          push: false
          tags: indel-fraud-ml:latest

  integration-tests:
    runs-on: ubuntu-latest
    needs: [compose-validate]
    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_USER: indel
      DB_PASSWORD: demo_password
      DB_NAME: indel_demo
      RAZORPAY_KEY_ID: ${{ secrets.RAZORPAY_KEY_ID }}
      RAZORPAY_KEY_SECRET: ${{ secrets.RAZORPAY_KEY_SECRET }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and start all services
        run: docker compose -f docker-compose.demo.yml up -d --build

      - name: Wait for core service to be healthy
        run: |
          for i in {1..30}; do
            if docker compose -f docker-compose.demo.yml exec core wget -q -O - http://127.0.0.1:8000/health; then
              echo "Core is healthy"
              exit 0
            fi
            echo "Waiting for core to be healthy..."
            sleep 5
          done
          echo "Core service failed to become healthy"
          docker compose -f docker-compose.demo.yml logs
          exit 1

      - name: Run integration tests
        run: |
          docker compose -f docker-compose.demo.yml run backend-worker-tests

      - name: Show logs on failure
        if: failure()
        run: docker compose -f docker-compose.demo.yml logs

      - name: Shutdown
        if: always()
        run: docker compose -f docker-compose.demo.yml down -v
